name: "pdf"
version: "0.1.0"
usage: "generate a PDF report from Trivy results"
description: |-
  A Trivy plugin that generates PDF reports from scan results.
  Supports scanning images, filesystems, and generating from existing JSON reports.
  trivy pdf [COMMAND] [TARGET] [OUTPUT]
  trivy pdf generate --from report.json --output report.pdf
maintainer: "Gjergj <gjergj@sheldija.net>"
repository: "https://github.com/gjergjsheldija/trivy-report-pdf"
platforms:
  - selector:
      os: linux
      arch: amd64
    uri: https://github.com/gjergjsheldija/trivy-report-pdf/releases/download/v0.1.0/trivy-pdf_0.1.0_Linux-64bit.tar.gz
    bin: ./trivy-pdf
  - selector:
      os: darwin
      arch: amd64
    uri: https://github.com/gjergjsheldija/trivy-report-pdf/releases/download/v0.1.0/trivy-pdf_0.1.0_macOS-64bit.tar.gz
    bin: ./trivy-pdf
  - selector:
      os: darwin
      arch: arm64
    uri: https://github.com/gjergjsheldija/trivy-report-pdf/releases/download/v0.1.0/trivy-pdf_0.1.0_macOS-ARM64.tar.gz
    bin: ./trivy-pdf
  - selector:
      os: windows
      arch: amd64
    uri: https://github.com/gjergjsheldija/trivy-report-pdf/releases/download/v0.1.0/trivy-pdf_0.1.0_Windows-64bit.zip
    bin: ./trivy-pdf.exe
