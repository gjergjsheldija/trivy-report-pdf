name: "pdf"
version: "0.1.0"
usage: "generate a PDF report from Trivy results"
description: |-
  A Trivy plugin that generates PDF reports from scan results.
  Supports scanning images, filesystems, and generating from existing JSON reports.
  trivy pdf [COMMAND] [TARGET] [OUTPUT]
  trivy pdf generate --from report.json --output report.pdf
maintainer: "Gjergj <gjergj@sheldija.net>"
repository: "https://github.com/gjergjsheldija/trivy-report-pdf"
platforms:
  - selector:
      os: linux
      arch: amd64
    uri: https://github.com/gjergjsheldija/trivy-report-pdf/releases/download/v{{.Version}}/trivy-pdf_{{.Version}}_Linux-64bit
    bin: ./trivy-pdf
  - selector:
      os: darwin
      arch: amd64
    uri: https://github.com/gjergjsheldija/trivy-report-pdf/releases/download/v{{.Version}}/trivy-pdf_{{.Version}}_macOS-64bit
    bin: ./trivy-pdf
  - selector:
      os: darwin
      arch: arm64
    uri: https://github.com/gjergjsheldija/trivy-report-pdf/releases/download/v{{.Version}}/trivy-pdf_{{.Version}}_macOS-ARM64
    bin: ./trivy-pdf
  - selector:
      os: windows
      arch: amd64
    uri: https://github.com/gjergjsheldija/trivy-report-pdf/releases/download/v{{.Version}}/trivy-pdf_{{.Version}}_Windows-64bit.exe
    bin: ./trivy-pdf.exe
